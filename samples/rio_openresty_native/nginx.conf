worker_processes 1;

events {
    worker_connections 1024;
}

http {
    lua_package_path '/rio/lib/?.lua;/rio/lib/?/init.lua;/app/?.lua;./?.lua;;';
    lua_package_cpath '/usr/local/lib/lua/5.1/?.so;;';

    init_by_lua_block {
        require("rio.bootstrap")
        local rio = require("rio")
        _G.app = rio.new({
            api_only = true,
            app_name = "Rio Native OpenResty"
        })
        _G.app:bootstrap()
    }

    server {
        listen 80;
        location / {
            content_by_lua_block {
                _G.app:handle_ngx()
            }
        }
    }
}