version: '3.8'

services:
  api_app:
    build:
      context: ../../
      dockerfile: samples/rio_showcase_api/Dockerfile
    environment:
      - RIO_ENV=development
    volumes:
      - ./db:/app/db
      - ./tmp:/app/tmp
    tty: true
    stdin_open: true
    restart: unless-stopped

  gateway:
    image: openresty/openresty:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - api_app
    restart: unless-stopped
