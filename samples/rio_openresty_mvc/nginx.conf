user root;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Set default Nginx working directory
    root /app;

    # Lua package paths
    lua_package_path '/app/?.lua;/app/lib/?.lua;;';
    lua_package_cpath '/usr/local/lib/lua/5.1/?.so;;';

    # REQUIRED for Rio Cable (Action Cable style Pub/Sub)
    lua_shared_dict rio_cable 10m;

    init_by_lua_block {
        local ok_config, config = pcall(require, "config.application")
        if not ok_config then config = {} end

        local rio = require("rio")
        _G.app = rio.new(config)
        _G.app:bootstrap()
    }

    server {
        listen 80;
        
        location / {
            content_by_lua_block {
                _G.app:handle_ngx()
            }
        }

        # Handle WebSockets explicitly if needed by Nginx, 
        # but Rio's handle_ngx already manages the upgrade.
        
        location /public/ {
            alias /app/public/;
        }
    }
}
