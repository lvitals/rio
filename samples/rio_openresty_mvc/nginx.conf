user root;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Set default Nginx working directory
    root /app;

    # Lua package paths for the Docker environment
    lua_package_path '/app/?.lua;/app/lib/?.lua;;';
    lua_package_cpath '/usr/local/lib/lua/5.1/?.so;;';

    init_by_lua_block {
        -- Initialize Rio environment (as per framework example)
        pcall(require, "rio.bootstrap")

        -- Load application configuration
        local ok_config, config = pcall(require, "config.application")
        if not ok_config then config = {} end

        -- Initialize Rio application
        local rio = require("rio")
        _G.app = rio.new(config)
        
        -- Run bootstrap to load routes, DB, etc.
        _G.app:bootstrap()
    }

    server {
        listen 80;
        
        # Application logs
        access_log /app/log/access.log;
        error_log /app/log/error.log;

        location / {
            content_by_lua_block {
                -- Handle requests via OpenResty
                _G.app:handle_ngx()
            }
        }

        # Static files configuration
        location /public/ {
            alias /app/public/;
        }
    }
}
