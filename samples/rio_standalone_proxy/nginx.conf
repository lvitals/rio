worker_processes  1;
events {
    worker_connections  1024;
}
http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        # Listen on the public port
        listen       8083;
        server_name  localhost;

        location / {
            # Proxy to the Rio app, which is also on the host network
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /status {
            content_by_lua_block {
                ngx.say("Standalone Gateway (Host Mode) is UP")
            }
        }
    }
}
